<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding API – Simulated frontend</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        max-width: 480px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1a1a1a;
      }
      h1 {
        font-size: 1.25rem;
        margin-bottom: 0.5rem;
      }
      .hint {
        font-size: 0.875rem;
        color: #666;
        margin-bottom: 1.5rem;
      }
      #app {
        min-height: 200px;
      }
      .card {
        background: #f5f5f5;
        border-radius: 8px;
        padding: 1rem;
        margin-top: 1rem;
      }
      .card h2 {
        font-size: 0.875rem;
        margin: 0 0 0.5rem;
        color: #555;
      }
      pre {
        margin: 0;
        font-size: 0.75rem;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-all;
      }
      button {
        background: #1a1a1a;
        color: #fff;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.875rem;
        margin-top: 0.5rem;
      }
      button:hover {
        background: #333;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .error {
        color: #c00;
        font-size: 0.875rem;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <h1>Wedding API – Simulated frontend</h1>
    <p class="hint">Sign in with Clerk, then call your API with the session token.</p>
    <div id="app">Loading Clerk…</div>
    <div id="api-section" style="display: none">
      <div class="card">
        <h2>Call API (GET /users/me)</h2>
        <button id="call-api">Call API</button>
        <pre id="api-result"></pre>
        <p id="api-error" class="error"></p>
      </div>
    </div>

    <!--
    Replace this script tag with the one from Clerk Dashboard:
    API Keys → Quick copy → choose "JavaScript" and paste the full <script> here.
  -->
    <script
      async
      crossorigin="anonymous"
      data-clerk-publishable-key="pk_test_cmVhbC1tb3JheS0yMi5jbGVyay5hY2NvdW50cy5kZXYk"
      src="https://real-moray-22.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
      type="text/javascript"
    ></script>

    <script>
      const API_BASE = 'http://localhost:3001'

      window.addEventListener('load', async function () {
        const app = document.getElementById('app')
        const apiSection = document.getElementById('api-section')
        const callApiBtn = document.getElementById('call-api')
        const apiResult = document.getElementById('api-result')
        const apiError = document.getElementById('api-error')

        try {
          await Clerk.load()
        } catch (e) {
          app.innerHTML =
            '<p class="error">Clerk failed to load. Replace the script tag with the one from Clerk Dashboard (API Keys → Quick copy → JavaScript).</p>'
          return
        }

        function render() {
          if (Clerk.isSignedIn) {
            app.innerHTML = '<div id="user-button"></div>'
            Clerk.mountUserButton(document.getElementById('user-button'))
            apiSection.style.display = 'block'

            callApiBtn.onclick = async () => {
              apiError.textContent = ''
              apiResult.textContent = 'Loading…'
              callApiBtn.disabled = true
              try {
                const token = await Clerk.session.getToken()
                const res = await fetch(API_BASE + '/users/me', {
                  headers: { Authorization: 'Bearer ' + token },
                })
                const data = await res.json().catch(() => ({}))
                apiResult.textContent = res.ok
                  ? JSON.stringify(data, null, 2)
                  : res.status + ' ' + res.statusText + '\n' + JSON.stringify(data, null, 2)
                if (!res.ok)
                  apiError.textContent = 'Request failed. Is the API running on ' + API_BASE + '?'
              } catch (err) {
                apiResult.textContent = ''
                apiError.textContent = err.message || 'Request failed. Is the API running?'
              }
              callApiBtn.disabled = false
            }
          } else {
            app.innerHTML = '<div id="sign-in"></div>'
            Clerk.mountSignIn(document.getElementById('sign-in'))
            apiSection.style.display = 'none'
          }
        }

        let lastSignedIn = Clerk.isSignedIn
        render()
        Clerk.addListener(function () {
          if (Clerk.isSignedIn !== lastSignedIn) {
            lastSignedIn = Clerk.isSignedIn
            render()
          }
        })
      })
    </script>
  </body>
</html>
